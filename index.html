<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halk Müziği</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #c8963e;
    --text: #d4cfc8;
    --muted: #5a5550;
    --font: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  #player-box {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  #now-playing {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    margin-bottom: 0.4rem;
    min-height: 1.2em;
  }

  #now-playing-inner {
    display: inline-block;
    white-space: nowrap;
  }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  #now-playing-inner.scrolling {
    animation: marquee 12s linear infinite;
  }

  #track-index {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  audio { display: none; }

  #custom-player {
    margin-bottom: 1.2rem;
  }

  #seek-bar-wrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
    margin-bottom: 0.5rem;
    cursor: pointer;
  }

  #seek-track {
    position: absolute;
    left: 0; right: 0;
    height: 5px;
    background: #3a3a3a;
    border-radius: 3px;
  }

  #seek-fill {
    height: 100%;
    width: 0%;
    background: #ffffff;
    border-radius: 3px;
    pointer-events: none;
  }

  #seek-thumb {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #ffffff;
    border-radius: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    left: 0%;
    pointer-events: none;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  #seek-input {
    position: absolute;
    left: 0; right: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0;
  }

  #player-time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  #player-btn-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  #btn-playpause {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 1rem;
    width: 2.4rem;
    height: 2.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    padding: 0;
    flex-shrink: 0;
  }
  #btn-playpause:hover { border-color: var(--accent); color: var(--accent); }

  #volume-wrap {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-left: auto;
  }

  #vol-icon {
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  #vol-bar-wrap {
    position: relative;
    width: 70px;
    height: 20px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }

  #vol-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: #3a3a3a;
    border-radius: 2px;
  }

  #vol-fill {
    height: 100%;
    width: 100%;
    background: #ffffff;
    border-radius: 2px;
    pointer-events: none;
  }

  #vol-thumb {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #ffffff;
    border-radius: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    left: 100%;
    pointer-events: none;
  }

  #vol-input {
    position: absolute;
    left: 0; right: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0;
  }

  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active { border-color: var(--accent); color: var(--accent); }

  #search-box {
    width: 100%;
    max-width: 480px;
    margin-bottom: 0.5rem;
    display: flex;
  }

  #search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  #search-clear {
    background: none;
    border: 1px solid var(--border);
    color: #ffffff;
    font-family: var(--font);
    font-size: 0.6rem;
    padding: 0.5rem 0.5rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.15s, border-color 0.15s;
  }
  #search-clear:hover { color: var(--accent); border-color: var(--accent); }

  #search-count {
    width: 100%;
    max-width: 480px;
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    min-height: 1em;
  }

  #track-list-box {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    max-height: 340px;
    overflow-y: auto;
  }

  #track-list-box::-webkit-scrollbar { width: 4px; }
  #track-list-box::-webkit-scrollbar-track { background: var(--surface); }
  #track-list-box::-webkit-scrollbar-thumb { background: var(--border); }

  .track-item {
    padding: 0.55rem 1rem;
    font-size: 0.7rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }

  .track-item:last-child { border-bottom: none; }
  .track-item:hover { background: #222; }
  .track-item.playing { color: var(--accent); }
  .highlight { color: var(--accent); font-weight: 600; }

  #status {
    font-size: 0.65rem;
    color: var(--muted);
    padding: 1rem;
    text-align: center;
  }

  #cache-info {
    width: 100%;
    max-width: 480px;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.4rem;
    text-align: right;
  }

  #footer {
    width: 100%;
    max-width: 480px;
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 1.2rem;
    text-align: center;
    line-height: 1.6;
    padding-bottom: 1rem;
    border-top: 1px solid var(--border);
    padding-top: 0.8rem;
  }
</style>
</head>
<body>

<h1>Halk Müziği</h1>

<div id="player-box">
  <div id="now-playing"><span id="now-playing-inner">—</span></div>
  <div id="track-index">— / —</div>
  <audio id="audio" preload="none"></audio>
  <div id="custom-player">
    <div id="seek-bar-wrap">
      <div id="seek-track"><div id="seek-fill"></div></div>
      <div id="seek-thumb"></div>
      <input id="seek-input" type="range" min="0" max="1000" value="0" step="1">
    </div>
    <div id="player-time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
    <div id="player-btn-row">
      <button id="btn-playpause">&#9654;</button>
      <div id="volume-wrap">
        <span id="vol-icon">&#128266;</span>
        <div id="vol-bar-wrap">
          <div id="vol-track"><div id="vol-fill"></div></div>
          <div id="vol-thumb"></div>
          <input id="vol-input" type="range" min="0" max="100" value="100" step="1">
        </div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button id="btn-prev">◀ Önceki</button>
    <button id="btn-next">Sonraki ▶</button>
    <button id="btn-shuffle">Karışık</button>
    <button id="btn-seq" class="active">Sıralı</button>
  </div>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Ara… (örn: Gönül gel seninle muhabbet edelim)" autocomplete="off" spellcheck="false">
  <button id="search-clear">Temizle</button>
</div>
<div id="search-count"></div>

<div id="track-list-box">
  <div id="status">Yükleniyor…</div>
</div>

<div id="cache-info"></div>

<div id="footer">
  Sitedeki eserler yalnızca dinleme amacı taşır. © Telif Hakkı Saklıdır.<br>
  Düzenleme Barış ARSLAN
</div>

<script>
const API_KEY      = 'AIzaSyDyRZUA937qtcVkiWiKC5gSk2BFp9S_S90';
const FOLDER_ID    = '1zqzaui3XpdeWczXa1ARTGYdmg7Atdz9x';
const CACHE_URL    = './cache.json';
const FIREBASE_URL = 'https://arslan29-turkulerimiz-default-rtdb.firebaseio.com';

// tracks: tüm parçalar, daima alfabetik sırada
// displayList: şu an listede gösterilen parça indexleri (filtreli, alfabetik)
// playQueue: çalma sırası (shuffle varsa karışık, yoksa displayList ile aynı)
// currentTrackId: şu an çalan parçanın tracks içindeki indexi

let tracks       = [];
let displayList  = []; // gösterilen liste (her zaman alfabetik)
let playQueue    = []; // çalma sırası (shuffle ise karışık)
let playPos      = -1; // playQueue içindeki pozisyon
let shuffle      = false;
let searchQuery  = '';

const audio       = document.getElementById('audio');
const nowPlaying  = document.getElementById('now-playing');
const nowPlayingInner = document.getElementById('now-playing-inner');
const trackIndex  = document.getElementById('track-index');
const statusEl    = document.getElementById('status');
const listEl      = document.getElementById('track-list-box');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchCount = document.getElementById('search-count');
const cacheInfo   = document.getElementById('cache-info');

function setNowPlaying(name) {
  // Kayan yazı: metin container'dan geniş mi?
  nowPlayingInner.classList.remove('scrolling');
  nowPlayingInner.style.animation = 'none';
  nowPlayingInner.textContent = name;
  // Animasyonu sıfırla sonra kontrol et
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (nowPlayingInner.scrollWidth > nowPlaying.clientWidth) {
        // Kayan efekt: metni çift yaz (seamless loop için)
        nowPlayingInner.textContent = name + '\u00a0\u00a0\u00a0\u00a0\u00a0' + name + '\u00a0\u00a0\u00a0\u00a0\u00a0';
        nowPlayingInner.style.animation = '';
        nowPlayingInner.classList.add('scrolling');
      }
    });
  });
}

function trLower(str) {
  return str
    .replace(/İ/g,'i').replace(/I/g,'ı')
    .replace(/Ğ/g,'ğ').replace(/Ü/g,'ü')
    .replace(/Ş/g,'ş').replace(/Ö/g,'ö')
    .replace(/Ç/g,'ç').toLowerCase();
}

function matchesSearch(track, queryLower) {
  if (!queryLower) return true;
  return queryLower.trim().split(/\s+/).filter(Boolean)
    .every(w => track.nameLower.includes(w));
}

function getTrackUrl(track) {
  return `https://www.googleapis.com/drive/v3/files/${track.id}?alt=media&key=${API_KEY}`;
}

// ─── CACHE / DRIVE YÜKLEMESİ ───────────────────────────────────────────────
async function loadFromCache() {
  const res = await fetch(CACHE_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('cache yok');
  const data = await res.json();
  if (!data.tracks?.length) throw new Error('cache boş');
  return data.tracks;
}

async function fetchFolder(folderId) {
  let files = [], pt = null;
  do {
    let url = `https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent(`'${folderId}' in parents and mimeType='audio/mpeg' and trashed=false`)}` +
      `&fields=nextPageToken,files(id,name)&pageSize=1000&key=${API_KEY}`;
    if (pt) url += `&pageToken=${encodeURIComponent(pt)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Drive API: HTTP ${res.status}`);
    const d = await res.json();
    files = files.concat(d.files || []);
    pt = d.nextPageToken || null;
  } while (pt);
  return files;
}

async function loadFromDrive() {
  let all = await fetchFolder(FOLDER_ID);
  try {
    const subRes = await fetch(`https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`)}` +
      `&fields=files(id)&pageSize=100&key=${API_KEY}`);
    if (subRes.ok) {
      const sub = await subRes.json();
      for (const f of (sub.files || [])) all = all.concat(await fetchFolder(f.id));
    }
  } catch(_) {}
  return all
    .map(f => ({ name: f.name.replace(/\.mp3$/i,''), id: f.id }))
    .sort((a,b) => a.name.localeCompare(b.name,'tr'));
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    let rawTracks;
    try {
      rawTracks = await loadFromCache();
      cacheInfo.textContent = `${rawTracks.length} parça · önbellekten yüklendi`;
    } catch(_) {
      statusEl.textContent = 'Drive\'dan yükleniyor… (ilk yükleme uzun sürebilir)';
      rawTracks = await loadFromDrive();
      cacheInfo.textContent = `${rawTracks.length} parça · Drive\'dan yüklendi`;
    }
    if (!rawTracks?.length) { statusEl.textContent = 'Hiç parça bulunamadı.'; return; }
    const playCounts = await fetchPlayCounts();
    tracks = rawTracks
      .map(t => ({ ...t, nameLower: trLower(t.name), playCount: playCounts[t.id] || 0 }))
      .sort((a, b) => b.playCount - a.playCount || a.name.localeCompare(b.name, 'tr'));
    updateDisplayList();
    renderList();

    // URL'de parça ismi varsa direkt o parçayı yükle (otomatik çalmaz)
    const slug = getSlugFromURL();
    if (slug) {
      const ti = findTrackBySlug(slug);
      if (ti >= 0) {
        const qPos = playQueue.indexOf(ti);
        playPos = qPos >= 0 ? qPos : 0;
        const t = tracks[ti];
        audio.src = getTrackUrl(t);
        setNowPlaying(t.name);
        trackIndex.textContent = (playPos + 1) + ' / ' + playQueue.length;
        updateActiveItem();
      }
    }
  } catch(e) {
    statusEl.textContent = `Hata: ${e.message}`;
    console.error(e);
  }
}

// ─── GÖRÜNTÜ LİSTESİ (her zaman alfabetik) ─────────────────────────────────
function updateDisplayList() {
  const qLower = trLower(searchQuery);
  displayList = tracks.map((_,i)=>i).filter(i => matchesSearch(tracks[i], qLower));
  // playQueue'yu displayList'ten oluştur
  buildPlayQueue();
}

// ─── ÇALMA SIRASI ───────────────────────────────────────────────────────────
// playQueue: displayList'teki indexleri karışık ya da sıralı tutar
// Liste görüntüsü HİÇBİR ZAMAN değişmez
function buildPlayQueue(keepCurrentTrack) {
  if (shuffle) {
    // displayList'i karıştır ama liste gösterimi değişmez
    playQueue = [...displayList].sort(() => Math.random() - 0.5);
  } else {
    playQueue = [...displayList];
  }

  // Eğer şu an çalan parça varsa, onu playQueue'da bul ve pozisyonu koru
  if (keepCurrentTrack !== undefined) {
    const pos = playQueue.indexOf(keepCurrentTrack);
    playPos = pos >= 0 ? pos : 0;
  } else {
    playPos = -1;
  }
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderList() {
  listEl.innerHTML = '';
  if (!displayList.length) {
    const d = document.createElement('div');
    d.id = 'status'; d.textContent = 'Sonuç bulunamadı.';
    listEl.appendChild(d); searchCount.textContent = ''; return;
  }
  searchCount.textContent = searchQuery
    ? `${displayList.length} / ${tracks.length} sonuç`
    : `${tracks.length} parça`;

  const words = trLower(searchQuery).trim().split(/\s+/).filter(Boolean);

  // Liste HER ZAMAN alfabetik (displayList sırası)
  displayList.forEach((ti, pos) => {
    const t = tracks[ti];
    const div = document.createElement('div');
    div.className = 'track-item';
    div.dataset.trackidx = ti; // tracks içindeki gerçek index

    if (words.length) {
      div.innerHTML = `${pos+1}. ${highlightWords(t.name, words)}`;
    } else {
      div.textContent = `${pos+1}. ${t.name}`;
    }

    div.addEventListener('click', () => {
      // Tıklanan parçayı playQueue'da bul
      const qPos = playQueue.indexOf(ti);
      if (qPos >= 0) {
        playPos = qPos;
      } else {
        // playQueue'da yoksa (arama sonucu değişti), yeniden kur
        buildPlayQueue(ti);
      }
      loadAndPlay(ti);
    });
    listEl.appendChild(div);
  });

  updateActiveItem();
}

function highlightWords(name, words) {
  let r = escapeHtml(name);
  words.forEach(w => {
    const pat = w.split('').map(c => {
      for (const [lo,hi] of [['i','İ'],['ı','I'],['ğ','Ğ'],['ü','Ü'],['ş','Ş'],['ö','Ö'],['ç','Ç']]) {
        if (c===lo) return `[${lo}${hi}]`;
        if (c===hi) return `[${lo}${hi}]`;
      }
      return c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    }).join('');
    try { r = r.replace(new RegExp(`(${pat})`,'gi'),'<span class="highlight">$1</span>'); } catch(_){}
  });
  return r;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Şu an çalan parçayı listede vurgula (trackidx ile bul)
function updateActiveItem() {
  if (playPos < 0 || !playQueue.length) return;
  const currentTrackIdx = playQueue[playPos];
  document.querySelectorAll('.track-item').forEach(el => {
    el.classList.toggle('playing', parseInt(el.dataset.trackidx) === currentTrackIdx);
  });
  const active = listEl.querySelector('.playing');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

// ─── PLAYBACK ──────────────────────────────────────────────────────────────
// ─── URL YÖNETİMİ ──────────────────────────────────────────────────────────
function nameToSlug(name) {
  return trLower(name)
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9ğüşıöçğüşöç\-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function updateURL(trackName) {
  const slug = nameToSlug(trackName);
  const repoName = 'Arslan29-turkulerimiz';
  history.replaceState(null, '', '/' + repoName + '/' + slug);
  document.title = trackName + ' · Halk Müziği';
}

function getSlugFromURL() {
  const parts = location.pathname.split('/').filter(Boolean);
  // Son segment repo adı değilse slug'dır
  const repoName = 'Arslan29-turkulerimiz';
  const last = parts[parts.length - 1];
  return (last && last !== repoName) ? last : null;
}

function findTrackBySlug(slug) {
  if (!slug) return -1;
  return tracks.findIndex(t => nameToSlug(t.name) === slug);
}

function loadAndPlay(trackIdx) {
  const t = tracks[trackIdx];
  audio.src = getTrackUrl(t);
  setNowPlaying(t.name);
  trackIndex.textContent = `${playPos + 1} / ${playQueue.length}`;
  updateActiveItem();
  updateURL(t.name);
  audio.play();
  recordPlay(t.id);
}

// ─── FİREBASE ──────────────────────────────────────────────────────────────
async function fetchPlayCounts() {
  try {
    const res = await fetch(`${FIREBASE_URL}/plays.json`);
    if (!res.ok) return {};
    const data = await res.json();
    return data || {};
  } catch(e) {
    return {};
  }
}

async function recordPlay(trackId) {
  try {
    const res = await fetch(`${FIREBASE_URL}/plays/${trackId}.json`);
    const current = res.ok ? (await res.json() || 0) : 0;
    await fetch(`${FIREBASE_URL}/plays/${trackId}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(current + 1)
    });
  } catch(e) {
    console.warn('Dinleme kaydedilemedi:', e);
  }
}

function playNext() {
  if (!playQueue.length) return;
  if (playPos < playQueue.length - 1) {
    playPos++;
  } else {
    // Liste bitti, shuffle ise yeniden karıştır
    buildPlayQueue();
    playPos = 0;
  }
  loadAndPlay(playQueue[playPos]);
}

function playPrev() {
  if (!playQueue.length) return;
  if (playPos > 0) {
    playPos--;
    loadAndPlay(playQueue[playPos]);
  }
}

// ─── CUSTOM PLAYER KONTROLLER ──────────────────────────────────────────────
const seekInput    = document.getElementById('seek-input');
const seekFill     = document.getElementById('seek-fill');
const seekThumb    = document.getElementById('seek-thumb');
const timeCurrent  = document.getElementById('time-current');
const timeTotal    = document.getElementById('time-total');
const btnPlayPause = document.getElementById('btn-playpause');
const volInput     = document.getElementById('vol-input');
const volFill      = document.getElementById('vol-fill');
const volThumb     = document.getElementById('vol-thumb');
const volIcon      = document.getElementById('vol-icon');

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateSeek() {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  seekFill.style.width = pct + '%';
  seekThumb.style.left = pct + '%';
  timeCurrent.textContent = fmtTime(audio.currentTime);
}

function updateVolUI() {
  const pct = audio.volume * 100;
  volFill.style.width = pct + '%';
  volThumb.style.left = pct + '%';
  volIcon.textContent = audio.muted || audio.volume === 0 ? '\u{1F507}' : '\u{1F50A}';
}

audio.addEventListener('timeupdate', updateSeek);

audio.addEventListener('durationchange', () => {
  timeTotal.textContent = fmtTime(audio.duration);
  updateSeek();
});

audio.addEventListener('play',  () => { btnPlayPause.innerHTML = '&#9646;&#9646;'; });
audio.addEventListener('pause', () => { btnPlayPause.innerHTML = '&#9654;'; });

seekInput.addEventListener('input', () => {
  const pct = seekInput.value / 1000;
  if (audio.duration) audio.currentTime = pct * audio.duration;
  seekFill.style.width = (pct * 100) + '%';
  seekThumb.style.left = (pct * 100) + '%';
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  seekInput.value = Math.round((audio.currentTime / audio.duration) * 1000);
});

btnPlayPause.addEventListener('click', () => {
  if (audio.paused) { audio.play(); } else { audio.pause(); }
});

volInput.addEventListener('input', () => {
  audio.volume = volInput.value / 100;
  audio.muted = false;
  updateVolUI();
});

volIcon.addEventListener('click', () => {
  audio.muted = !audio.muted;
  updateVolUI();
});

updateVolUI();

audio.addEventListener('ended', playNext);

// ─── ARAMA — MÜZİĞİ KESMEDEN ───────────────────────────────────────────────
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = searchInput.value;
    // Şu an çalan parçayı kaydet
    const currentTrackIdx = playPos >= 0 && playQueue.length ? playQueue[playPos] : -1;
    updateDisplayList();
    // playQueue'yu yeniden kur, mevcut parçayı koru
    if (currentTrackIdx >= 0) buildPlayQueue(currentTrackIdx);
    renderList();
    // Müziği KESME — audio.src değişmiyor
  }, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  const currentTrackIdx = playPos >= 0 && playQueue.length ? playQueue[playPos] : -1;
  updateDisplayList();
  if (currentTrackIdx >= 0) buildPlayQueue(currentTrackIdx);
  renderList();
  searchInput.focus();
});

// ─── BUTONLAR ──────────────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', playPrev);
document.getElementById('btn-next').addEventListener('click', playNext);

document.getElementById('btn-shuffle').addEventListener('click', function() {
  shuffle = true;
  this.classList.add('active');
  document.getElementById('btn-seq').classList.remove('active');
  // Şu an çalan parçayı koru, çalma sırasını karıştır
  const currentTrackIdx = playPos >= 0 && playQueue.length ? playQueue[playPos] : -1;
  buildPlayQueue(currentTrackIdx >= 0 ? currentTrackIdx : undefined);
  // Liste görüntüsü değişmez, sadece vurguyu güncelle
  updateActiveItem();
});

document.getElementById('btn-seq').addEventListener('click', function() {
  shuffle = false;
  this.classList.add('active');
  document.getElementById('btn-shuffle').classList.remove('active');
  // Şu an çalan parçayı koru, sıralıya geç
  const currentTrackIdx = playPos >= 0 && playQueue.length ? playQueue[playPos] : -1;
  buildPlayQueue(currentTrackIdx >= 0 ? currentTrackIdx : undefined);
  updateActiveItem();
});

init();
</script>
</body>
</html>
