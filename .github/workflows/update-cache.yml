name: Drive Cache Güncelle

on:
  schedule:
    - cron: '0 3 * * 1'  # Her Pazartesi 03:00 UTC
  workflow_dispatch:       # Elle de çalıştırılabilir

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install requests google-auth google-api-python-client

      - name: cache.json oluştur
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          SHEET_ID: ${{ secrets.GDRIVE_SHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python generate_cache.py

      - name: index.html içine key'leri yerleştir
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          sed -i "s|'GDRIVE_API_KEY'|'${API_KEY}'|g" index.html
          sed -i "s|'GDRIVE_FOLDER_ID'|'${FOLDER_ID}'|g" index.html

      - name: Değişiklik varsa commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json index.html
          git diff --cached --quiet || git commit -m "cache.json güncellendi $(date +'%Y-%m-%d')"
          git push
