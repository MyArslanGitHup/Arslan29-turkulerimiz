name: Drive Cache Güncelle

on:
  schedule:
    - cron: '0 3 * * 1'  # Her Pazartesi 03:00 UTC
  workflow_dispatch:       # Elle de çalıştırılabilir

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Requests kütüphanesini yükle
        run: pip install requests

      - name: cache.json oluştur
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python generate_cache.py

      - name: Değişiklik varsa commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --cached --quiet || git commit -m "cache.json güncellendi $(date +'%Y-%m-%d')"
          git push
