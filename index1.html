<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türk Halk Müziği</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #c8963e;
    --text: #d4cfc8;
    --muted: #5a5550;
    --font: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  #player-box {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  #now-playing {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.4rem;
    min-height: 1.2em;
  }

  #track-index {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  audio {
    width: 100%;
    margin-bottom: 1.2rem;
    accent-color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active { border-color: var(--accent); color: var(--accent); }

  #search-box {
    width: 100%;
    max-width: 480px;
    margin-bottom: 0.5rem;
    display: flex;
  }

  #search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  #search-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.75rem;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #search-clear:hover { color: var(--accent); border-color: var(--accent); }

  #search-count {
    width: 100%;
    max-width: 480px;
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    min-height: 1em;
  }

  #track-list-box {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    max-height: 340px;
    overflow-y: auto;
  }

  #track-list-box::-webkit-scrollbar { width: 4px; }
  #track-list-box::-webkit-scrollbar-track { background: var(--surface); }
  #track-list-box::-webkit-scrollbar-thumb { background: var(--border); }

  .track-item {
    padding: 0.55rem 1rem;
    font-size: 0.7rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }

  .track-item:last-child { border-bottom: none; }
  .track-item:hover { background: #222; }
  .track-item.playing { color: var(--accent); }
  .highlight { color: var(--accent); font-weight: 600; }

  #status {
    font-size: 0.65rem;
    color: var(--muted);
    padding: 1rem;
    text-align: center;
  }

  #cache-info {
    width: 100%;
    max-width: 480px;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.4rem;
    text-align: right;
  }
</style>
</head>
<body>

<h1>Türk Halk Müziği</h1>

<div id="player-box">
  <div id="now-playing">—</div>
  <div id="track-index">— / —</div>
  <audio id="audio" controls preload="none"></audio>
  <div class="controls">
    <button id="btn-prev">◀ Önceki</button>
    <button id="btn-next">Sonraki ▶</button>
    <button id="btn-shuffle">Karışık</button>
    <button id="btn-seq" class="active">Sıralı</button>
  </div>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Ara… (örn: gönül seninle)" autocomplete="off" spellcheck="false">
  <button id="search-clear">✕</button>
</div>
<div id="search-count"></div>

<div id="track-list-box">
  <div id="status">Yükleniyor…</div>
</div>

<div id="cache-info"></div>

<script>
const API_KEY   = 'AIzaSyDyRZUA937qtcVkiWiKC5gSk2BFp9S_S90';
const FOLDER_ID = '1zqzaui3XpdeWczXa1ARTGYdmg7Atdz9x';
const CACHE_URL = './cache.json';

let tracks  = [];
let order   = [];
let cursor  = -1;
let shuffle = false;
let searchQuery = '';

const audio       = document.getElementById('audio');
const nowPlaying  = document.getElementById('now-playing');
const trackIndex  = document.getElementById('track-index');
const statusEl    = document.getElementById('status');
const listEl      = document.getElementById('track-list-box');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchCount = document.getElementById('search-count');
const cacheInfo   = document.getElementById('cache-info');

function trLower(str) {
  return str
    .replace(/İ/g,'i').replace(/I/g,'ı')
    .replace(/Ğ/g,'ğ').replace(/Ü/g,'ü')
    .replace(/Ş/g,'ş').replace(/Ö/g,'ö')
    .replace(/Ç/g,'ç').toLowerCase();
}

function matchesSearch(track, queryLower) {
  if (!queryLower) return true;
  return queryLower.trim().split(/\s+/).filter(Boolean)
    .every(w => track.nameLower.includes(w));
}

function getTrackUrl(track) {
  return `https://www.googleapis.com/drive/v3/files/${track.id}?alt=media&key=${API_KEY}`;
}

// ─── CACHE.JSON'DAN YÜKLE ──────────────────────────────────────────────────
async function loadFromCache() {
  const res = await fetch(CACHE_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('cache yok');
  const data = await res.json();
  if (!data.tracks?.length) throw new Error('cache boş');
  return data.tracks;
}

// ─── DRIVE'DAN YÜKLE (yedek) ───────────────────────────────────────────────
async function fetchFolder(folderId) {
  let files = [], pt = null;
  do {
    let url = `https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent(`'${folderId}' in parents and mimeType='audio/mpeg' and trashed=false`)}` +
      `&fields=nextPageToken,files(id,name)&pageSize=1000&key=${API_KEY}`;
    if (pt) url += `&pageToken=${encodeURIComponent(pt)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Drive API: HTTP ${res.status}`);
    const d = await res.json();
    files = files.concat(d.files || []);
    pt = d.nextPageToken || null;
  } while (pt);
  return files;
}

async function loadFromDrive() {
  let all = await fetchFolder(FOLDER_ID);
  try {
    const subRes = await fetch(`https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`)}` +
      `&fields=files(id)&pageSize=100&key=${API_KEY}`);
    if (subRes.ok) {
      const sub = await subRes.json();
      for (const f of (sub.files || [])) {
        all = all.concat(await fetchFolder(f.id));
      }
    }
  } catch(_) {}
  return all
    .map(f => ({ name: f.name.replace(/\.mp3$/i,''), id: f.id }))
    .sort((a,b) => a.name.localeCompare(b.name,'tr'));
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    let rawTracks;
    try {
      rawTracks = await loadFromCache();
      cacheInfo.textContent = `${rawTracks.length} parça · önbellekten yüklendi`;
    } catch(_) {
      statusEl.textContent = 'Drive\'dan yükleniyor… (ilk yükleme uzun sürebilir)';
      rawTracks = await loadFromDrive();
      cacheInfo.textContent = `${rawTracks.length} parça · Drive\'dan yüklendi`;
    }

    if (!rawTracks?.length) { statusEl.textContent = 'Hiç parça bulunamadı.'; return; }

    tracks = rawTracks.map(t => ({ ...t, nameLower: trLower(t.name) }));
    buildOrder();
    renderList();

  } catch(e) {
    statusEl.textContent = `Hata: ${e.message}`;
    console.error(e);
  }
}

function buildOrder() {
  const qLower = trLower(searchQuery);
  const filtered = tracks.map((_,i)=>i).filter(i => matchesSearch(tracks[i], qLower));
  order = shuffle ? filtered.sort(()=>Math.random()-0.5) : filtered;
  cursor = -1;
}

function renderList() {
  listEl.innerHTML = '';
  if (!order.length) {
    const d = document.createElement('div');
    d.id = 'status'; d.textContent = 'Sonuç bulunamadı.';
    listEl.appendChild(d); searchCount.textContent = ''; return;
  }
  searchCount.textContent = searchQuery
    ? `${order.length} / ${tracks.length} sonuç`
    : `${tracks.length} parça`;

  const words = trLower(searchQuery).trim().split(/\s+/).filter(Boolean);
  order.forEach((ti, pos) => {
    const t = tracks[ti];
    const div = document.createElement('div');
    div.className = 'track-item';
    div.dataset.pos = pos;
    div.innerHTML = words.length
      ? `${pos+1}. ${highlightWords(t.name, words)}`
      : '';
    if (!words.length) div.textContent = `${pos+1}. ${t.name}`;
    div.addEventListener('click', () => { cursor = pos; loadTrack(cursor); audio.play(); });
    listEl.appendChild(div);
  });
  updateActiveItem();
}

function highlightWords(name, words) {
  let r = escapeHtml(name);
  words.forEach(w => {
    const pat = w.split('').map(c => {
      for (const [lo,hi] of [['i','İ'],['ı','I'],['ğ','Ğ'],['ü','Ü'],['ş','Ş'],['ö','Ö'],['ç','Ç']]) {
        if (c===lo) return `[${lo}${hi}]`;
        if (c===hi) return `[${lo}${hi}]`;
      }
      return c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    }).join('');
    try { r = r.replace(new RegExp(`(${pat})`,'gi'),'<span class="highlight">$1</span>'); } catch(_){}
  });
  return r;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateActiveItem() {
  document.querySelectorAll('.track-item').forEach(el =>
    el.classList.toggle('playing', parseInt(el.dataset.pos)===cursor));
  if (cursor>=0) {
    const a = listEl.querySelector('.playing');
    if (a) a.scrollIntoView({block:'nearest'});
  }
}

function loadTrack(pos) {
  if (!order.length || pos<0) return;
  cursor = pos;
  const t = tracks[order[cursor]];
  audio.src = getTrackUrl(t);
  nowPlaying.textContent = t.name;
  trackIndex.textContent = `${cursor+1} / ${order.length}`;
  updateActiveItem();
}

function playNext() {
  if (!order.length) return;
  if (cursor < order.length-1) { loadTrack(cursor+1); audio.play(); }
  else { buildOrder(); renderList(); loadTrack(0); audio.play(); }
}
function playPrev() { if (cursor>0) { loadTrack(cursor-1); audio.play(); } }

audio.addEventListener('ended', playNext);

let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = searchInput.value; buildOrder(); renderList(); }, 200);
});
searchClear.addEventListener('click', () => {
  searchInput.value = ''; searchQuery = ''; buildOrder(); renderList(); searchInput.focus();
});

document.getElementById('btn-prev').addEventListener('click', playPrev);
document.getElementById('btn-next').addEventListener('click', playNext);
document.getElementById('btn-shuffle').addEventListener('click', function() {
  shuffle=true; this.classList.add('active');
  document.getElementById('btn-seq').classList.remove('active');
  buildOrder(); renderList();
});
document.getElementById('btn-seq').addEventListener('click', function() {
  shuffle=false; this.classList.add('active');
  document.getElementById('btn-shuffle').classList.remove('active');
  buildOrder(); renderList();
});

init();
</script>
</body>
</html>
